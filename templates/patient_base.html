<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuraX - Patient Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='neurax-theme.css') }}">

    <style>
        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(6px);
        }

        .sidebar-item.active {
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.3), transparent);
            border-left: 4px solid #c026d3;
            font-weight: 600;
        }
    </style>
</head>

<body class="bg-gray-50">

    <!-- Sidebar -->
    <div
        class="fixed inset-y-0 left-0 w-72 bg-gradient-to-b from-indigo-700 via-purple-700 to-violet-800 text-white shadow-2xl z-50 flex flex-col">

        <!-- Logo -->
        <div class="p-6 border-b border-white/20">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-2xl">🧠</div>
                <div>
                    <h1 class="text-2xl font-black">Neura<span class="text-purple-300">X</span></h1>
                    <p class="text-xs text-purple-200">Patient Portal</p>
                </div>
            </div>
        </div>

        <!-- Profile -->
        <div class="p-6 border-b border-white/20">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center text-2xl">👤</div>
                <div>
                    <p class="font-semibold">{{ user.full_name or 'Patient' }}</p>
                    <p class="text-xs text-purple-200">Patient</p>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 overflow-y-auto p-4 space-y-1">
            <a href="{{ url_for('patient_dashboard') }}"
                class="sidebar-item flex items-center px-5 py-3.5 rounded-2xl {% if request.path == '/patient/dashboard' %}active{% endif %}">
                <span class="mr-4 text-xl">🏠</span> Dashboard
            </a>
            <a href="{{ url_for('patient_appointments_page') }}"
                class="sidebar-item flex items-center px-5 py-3.5 rounded-2xl {% if request.path == '/patient/appointments' %}active{% endif %}">
                <span class="mr-4 text-xl">📅</span> My Appointments
            </a>
            <a href="{{ url_for('patient_chat_page') }}"
                class="sidebar-item flex items-center px-5 py-3.5 rounded-2xl {% if request.path == '/patient/chat' %}active{% endif %}">
                <span class="mr-4 text-xl">💬</span> Chat with Doctors
            </a>
            <a href="{{ url_for('patient_ai_assistant') }}"
                class="sidebar-item flex items-center px-5 py-3.5 rounded-2xl {% if request.path == '/patient/ai-assistant' %}active{% endif %}">
                <span class="mr-4 text-xl">🤖</span> AI Health Assistant
            </a>
            <a href="{{ url_for('patient_profile') }}"
                class="sidebar-item flex items-center px-5 py-3.5 rounded-2xl {% if '/patient/profile' in request.path %}active{% endif %}">
                <span class="mr-4 text-xl">👤</span> My Profile
            </a>
        </nav>

        <!-- Logout -->
        <div class="p-4 border-t border-white/20">
            <a href="{{ url_for('logout') }}"
                class="flex items-center px-5 py-3.5 rounded-2xl text-rose-200 hover:bg-rose-500/20">
                <span class="mr-4 text-xl">🚪</span> Sign Out
            </a>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="ml-72 min-h-screen">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>

</html>
